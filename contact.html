<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact — David Kithi</title>
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body>

  <nav>
    <a class="nav-logo" href="index.html">David Kithi</a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="projects.html">Projects</a>
      <a href="contact.html" class="active">Contact</a>
    </div>
  </nav>

  <div class="page-hero">
    <h1>Get In Touch</h1>
    <p>Have a project in mind? Let's talk!</p>
  </div>

  <div class="section">
    <div class="sec-title">Contact Me</div>
    <div class="sec-line"></div>
    <div class="contact-layout">

      <!-- FORM -->
      <div class="contact-form">
        <div class="form-group">
          <label for="name">Your Name</label>
          <input type="text" id="name" placeholder="e.g. Jane Doe"/>
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="e.g. jane@email.com"/>
        </div>
        <div class="form-group">
          <label for="subject">Subject</label>
          <input type="text" id="subject" placeholder="e.g. Project Collaboration"/>
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" placeholder="Tell me about your project or idea..."></textarea>
        </div>
        <button class="submit-btn" onclick="handleSubmit()">Send Message ↗</button>
      </div>

      <!-- CONTACT CARDS -->
      <div class="contact-info">
        <a class="contact-card" href="https://github.com/ray4240" target="_blank">
          <div class="c-ico">GH</div>
          <div><div class="c-lbl">GitHub</div><div class="c-val">ray4240</div></div>
        </a>
        <a class="contact-card" href="mailto:davidhamisi306@gmail.com">
          <div class="c-ico">✉</div>
          <div><div class="c-lbl">Email</div><div class="c-val">davidhamisi306@gmail.com</div></div>
        </a>
        <a class="contact-card" href="#">
          <div class="c-ico">in</div>
          <div><div class="c-lbl">LinkedIn</div><div class="c-val">Add your LinkedIn</div></div>
        </a>
        <a class="contact-card" href="https://github.com/ray4240" target="_blank">
          <div class="c-ico">◉</div>
          <div><div class="c-lbl">Location</div><div class="c-val">Nairobi, Kenya</div></div>
        </a>
      </div>

    </div>
  </div>

  <footer>built with passion &nbsp;·&nbsp; david kithi &nbsp;·&nbsp; nairobi, kenya &nbsp;·&nbsp; 2025</footer>

  <script>
    function handleSubmit() {
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const message = document.getElementById('message').value;
      if (!name || !email || !message) {
        alert('Please fill in all required fields.');
        return;
      }
      alert('Thanks ' + name + '! Your message has been sent. I\'ll get back to you soon.');
    }
  </script>

</body>
</html>
